<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Grid Chart</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<link rel="stylesheet" href="/webapp/style.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  height: 100dvh; display: flex; flex-direction: column;
  overflow: hidden; user-select: none;
}
.chart-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: var(--card);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.back-btn { background:none;border:none;color:var(--text);font-size:1.1rem;cursor:pointer;padding:4px 6px;border-radius:6px; }
.chart-title { font-weight:700;font-size:.95rem;flex:1; }
.chart-price { font-size:.9rem;font-weight:700; }
.chart-price.up   { color:var(--green); }
.chart-price.down { color:var(--red); }
#candle-countdown {
  font-size:.7rem;font-family:monospace;
  background:rgba(251,191,36,.12);color:#FBBF24;
  padding:2px 6px;border-radius:5px;min-width:42px;text-align:center;display:none;
}
.icon-btn { background:none;border:none;color:var(--text-muted);font-size:1rem;cursor:pointer;padding:4px 6px;border-radius:6px; }
.stats-bar {
  display:flex;gap:12px;padding:6px 12px;
  background:var(--card);border-bottom:1px solid var(--border);
  font-size:.72rem;color:var(--text-muted);flex-shrink:0;overflow-x:auto;white-space:nowrap;
}
.stat { display:flex;flex-direction:column;gap:1px; }
.stat strong { color:var(--text);font-size:.78rem; }
.tf-bar {
  display:flex;gap:4px;padding:5px 12px;
  background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;
}
.tf-btn { padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:none;color:var(--text-muted);font-size:.75rem;cursor:pointer; }
.tf-btn.active { background:var(--accent,#3B82F6);color:#fff;border-color:transparent; }
#chart-container { flex:1;position:relative;min-height:0; }
#chart { width:100%;height:100%; }
#drag-tooltip {
  position:absolute;background:rgba(15,23,42,.95);border:1px solid #3B82F6;
  color:#fff;font-size:.75rem;font-family:monospace;padding:5px 10px;
  border-radius:7px;pointer-events:none;display:none;z-index:50;
  white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4);
}
#drag-confirm {
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(15,23,42,.97);border:1px solid #3B82F6;border-radius:12px;
  padding:12px 16px;display:none;z-index:60;min-width:240px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
#drag-confirm .dc-title { font-size:.78rem;color:#94A3B8;margin-bottom:6px; }
#drag-confirm .dc-prices { font-size:.83rem;font-family:monospace;margin-bottom:10px;line-height:1.6; }
#drag-confirm .dc-btns { display:flex;gap:8px; }
#drag-confirm button { flex:1;padding:7px;border-radius:7px;border:none;cursor:pointer;font-size:.8rem;font-weight:600; }
.dc-ok     { background:#22C55E;color:#fff; }
.dc-edit   { background:#3B82F6;color:#fff; }
.dc-del    { background:#EF4444;color:#fff; }
.dc-cancel { background:rgba(255,255,255,.08);color:#94A3B8; }
#drag-confirm .dc-btns { display:flex;flex-direction:column;gap:6px; }
.orders-panel { flex-shrink:0;max-height:140px;overflow-y:auto;border-top:1px solid var(--border);background:var(--card); }
.orders-title { padding:5px 12px;font-size:.74rem;font-weight:600;color:var(--text-muted);border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card); }
.order-row { display:flex;justify-content:space-between;align-items:center;padding:5px 12px;font-size:.76rem;border-bottom:1px solid rgba(255,255,255,.03); }
.order-row .side-buy  { color:var(--green);font-weight:600; }
.order-row .side-sell { color:var(--red);font-weight:600; }
.overlay { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--text-muted);background:var(--bg);z-index:20; }
#drag-hint { position:absolute;bottom:8px;right:8px;font-size:.63rem;color:rgba(255,255,255,.2);pointer-events:none;z-index:10; }
</style>
</head>
<body>
<div class="chart-header">
  <button class="back-btn" onclick="history.back()">◀</button>
  <span class="chart-title" id="chart-title">Grid Chart</span>
  <span class="chart-price" id="chart-price">—</span>
  <span id="candle-countdown">—</span>
  <button class="icon-btn" onclick="loadChart()" title="تحديث">↻</button>
</div>
<div class="stats-bar">
  <div class="stat"><span>الأوامر</span><strong id="s-steps">—</strong></div>
  <div class="stat"><span>ربح/خطوة</span><strong id="s-step-pct">—</strong></div>
  <div class="stat"><span>صفقات</span><strong id="s-trades">—</strong></div>
  <div class="stat"><span>🟢 شراء</span><strong id="s-buys">—</strong></div>
  <div class="stat"><span>🔴 بيع</span><strong id="s-sells">—</strong></div>
  <div class="stat"><span>✅ منفذ</span><strong id="s-filled">—</strong></div>
  <div class="stat"><span>العلوي</span><strong id="s-upper">—</strong></div>
  <div class="stat"><span>السفلي</span><strong id="s-lower">—</strong></div>
</div>
<div class="tf-bar">
  <button class="tf-btn" data-tf="1m">1د</button>
  <button class="tf-btn active" data-tf="15m">15د</button>
  <button class="tf-btn" data-tf="1h">1س</button>
  <button class="tf-btn" data-tf="4h">4س</button>
  <button class="tf-btn" data-tf="1d">يوم</button>
</div>
<div id="chart-container">
  <div id="chart"></div>
  <div class="overlay" id="overlay">⏳ جاري التحميل...</div>
  <div id="drag-tooltip"></div>
  <div id="drag-confirm">
    <div class="dc-title" id="dc-title">أمر شراء</div>
    <div class="dc-prices" id="dc-prices"></div>
    <div class="dc-btns">
      <button class="dc-ok"     id="dc-ok">✅ تأكيد التعديل</button>
      <button class="dc-edit"   id="dc-edit">✏️ تعديل السعر</button>
      <button class="dc-del"    id="dc-del">🗑 حذف الأمر</button>
      <button class="dc-cancel" id="dc-cancel">✖ إلغاء</button>
    </div>
  </div>
  <div id="drag-hint">اسحب خط الأمر لتعديل سعره</div>
</div>
<div class="orders-panel">
  <div class="orders-title">الأوامر</div>
  <div id="orders-list"></div>
</div>
<script>
'use strict';
'use strict';

const BASE_URL = window.location.origin;
const params   = new URLSearchParams(location.search);
const GRID_ID  = parseInt(params.get('id') || '0');
let   TF       = params.get('tf') || '15m';
let   _apiKey  = '';
let   _chart, _candleSeries, _priceLine, _orderLines = [];
let   _refreshTimer = null;
let   _lastPrice    = 0;
let   _currentCandle = null;
let   _wsPrice       = null;
let   _countdownTimer = null;
let   _symbol        = '';
let   _sse           = null;
let   _lastLines     = [];   // آخر مجموعة خطوط لإعادة الرسم عند السحب

// ── Auth ──────────────────────────────────────────────────────────────────────
const _configReady = fetch(BASE_URL + '/api/config')
  .then(r => r.json()).then(d => { _apiKey = d.api_key || ''; }).catch(() => {});

function apiHeaders() {
  const h = { 'Content-Type': 'application/json' };
  if (_apiKey) h['X-API-Key'] = _apiKey;
  return h;
}
async function apiFetch(path) {
  await _configReady;
  const res  = await fetch(BASE_URL + path, { headers: apiHeaders() });
  const data = await res.json().catch(() => ({ error: 'invalid response' }));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ── Theme ─────────────────────────────────────────────────────────────────────
const isDark = (localStorage.getItem('theme') || 'dark') === 'dark';
const THEME = {
  layout:    { background: { color: isDark ? '#0A0F1F' : '#F0F4FF' }, textColor: isDark ? '#94A3B8' : '#475569' },
  grid:      { vertLines: { color: 'rgba(255,255,255,.04)' }, horzLines: { color: 'rgba(255,255,255,.04)' } },
  crosshair: { mode: 1 },
  timeScale: { borderColor: isDark ? '#1E293B' : '#CBD5E1', timeVisible: true, secondsVisible: false, lockVisibleTimeRangeOnResize: true },
  rightPriceScale: { borderColor: isDark ? '#1E293B' : '#CBD5E1' },
};

// ── Init chart ────────────────────────────────────────────────────────────────
function initChart() {
  const container = document.getElementById('chart');
  _chart = LightweightCharts.createChart(container, {
    ...THEME,
    width:  container.clientWidth,
    height: container.clientHeight,
    localization: { locale: 'ar-SA' },
  });
  _candleSeries = _chart.addCandlestickSeries({
    upColor: '#22C55E', downColor: '#EF4444',
    borderUpColor: '#22C55E', borderDownColor: '#EF4444',
    wickUpColor: '#22C55E', wickDownColor: '#EF4444',
  });
  new ResizeObserver(() => {
    _chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
  }).observe(container);

  // عند تحريك المستخدم: حدّث الـ range المحفوظ
  _chart.timeScale().subscribeVisibleTimeRangeChange((range) => {
    if (range && !_drag.active) {
      _lockedRange = range;
    }
  });
}

// ── Draw order lines ──────────────────────────────────────────────────────────
function drawLines(lines, currentPrice) {
  _lastLines = lines;
  _orderLines.forEach(l => _candleSeries.removePriceLine(l));
  _orderLines = [];

  if (_priceLine) _candleSeries.removePriceLine(_priceLine);
  _priceLine = _candleSeries.createPriceLine({
    price: currentPrice, color: '#FBBF24', lineWidth: 2,
    lineStyle: LightweightCharts.LineStyle.Solid,
    axisLabelVisible: true, title: `▶ ${currentPrice}`,
  });

  lines.forEach(l => {
    let lineStyle;
    if (l.filled)          lineStyle = LightweightCharts.LineStyle.SparseDotted;
    else if (l.type==='buy') lineStyle = LightweightCharts.LineStyle.Dashed;
    else                   lineStyle = LightweightCharts.LineStyle.Solid;

    const lineWidth = (l.type==='tp'||l.type==='sl') ? 2 : (l.type==='center') ? 1 : 2;

    let title = l.label || '';
    if ((l.type==='buy'||l.type==='sell') && l.qty) {
      const qty  = Number(l.qty).toPrecision(4);
      const icon = l.type==='buy' ? '▲' : '▼';
      title = `${icon} ${l.type==='buy'?'شراء':'بيع'} ${qty}${l.filled?' ✅':''}`;
    }

    const pl = _candleSeries.createPriceLine({
      price: l.price,
      color: l.filled ? l.color+'55' : l.color,
      lineWidth, lineStyle,
      axisLabelVisible: true, title,
    });
    pl._data = l;
    _orderLines.push(pl);
  });
}

// ── Render orders list ────────────────────────────────────────────────────────
function renderOrders(lines) {
  const el = document.getElementById('orders-list');
  const orders = lines.filter(l => l.type==='buy'||l.type==='sell');
  orders.sort((a,b) => b.price - a.price);
  if (!orders.length) {
    el.innerHTML = '<div style="padding:8px 12px;color:var(--text-muted);font-size:.78rem">لا توجد أوامر</div>';
    return;
  }
  el.innerHTML = orders.map(o => {
    const price = Number(o.price).toPrecision(6);
    const qty   = o.qty ? Number(o.qty).toPrecision(4) : '—';
    const bg    = o.filled ? 'rgba(34,197,94,.07)' : (o.type==='buy' ? 'rgba(34,197,94,.03)' : 'rgba(239,68,68,.03)');
    const status = o.filled
      ? `<span style="color:var(--green);font-size:.7rem">✅ منفذ</span>`
      : `<span style="color:var(--text-muted);font-size:.7rem">⏳ مفتوح</span>`;
    return `<div class="order-row" style="background:${bg}">
      <span class="side-${o.type}">${o.type==='buy'?'🟢 شراء':'🔴 بيع'}</span>
      <span style="font-family:monospace;font-weight:600">$${price}</span>
      <span style="color:var(--text-muted);font-size:.7rem">${qty}</span>
      ${status}
    </div>`;
  }).join('');
}

// ── Update price display ──────────────────────────────────────────────────────
function updatePriceDisplay(price) {
  const el = document.getElementById('chart-price');
  el.textContent = `$${price}`;
  if (_lastPrice) el.className = 'chart-price ' + (price >= _lastPrice ? 'up' : 'down');
  _lastPrice = price;
}

// ── Update stats ──────────────────────────────────────────────────────────────
function updateStats(lines, data) {
  const orders      = lines.filter(l => l.type==='buy'||l.type==='sell');
  const buyOpen     = orders.filter(l => l.type==='buy'  && !l.filled).length;
  const sellOpen    = orders.filter(l => l.type==='sell' && !l.filled).length;
  const filledCount = orders.filter(l => l.filled).length;
  document.getElementById('s-steps').textContent    = orders.length + ' أمر';
  document.getElementById('s-step-pct').textContent = (data.step_pct||'—') + '%';
  document.getElementById('s-trades').textContent   = data.trades ?? data.total_trades ?? '—';
  document.getElementById('s-buys').textContent     = buyOpen;
  document.getElementById('s-sells').textContent    = sellOpen;
  document.getElementById('s-filled').textContent   = filledCount;
  document.getElementById('s-upper').textContent    = '$' + (data.upper||'—');
  document.getElementById('s-lower').textContent    = '$' + (data.lower||'—');
}

// ── Load chart data ───────────────────────────────────────────────────────────
async function loadChart() {
  if (!GRID_ID) { document.getElementById('overlay').textContent = '❌ لم يتم تحديد الشبكة'; return; }
  try {
    const data = await apiFetch(`/api/grids/${GRID_ID}/chart?tf=${TF}`);
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('chart-title').textContent = `🔲 ${data.symbol}`;
    updatePriceDisplay(data.current_price);
    updateStats(data.lines, data);
    const wasEmpty = !_chart.timeScale().getVisibleRange();
    _candleSeries.setData(data.candles);
    // تحريك للنهاية عند أول تحميل فقط
    if (wasEmpty) {
      _chart.timeScale().scrollToRealTime();
      // احفظ الـ range بعد لحظة قصيرة
      setTimeout(() => {
        _lockedRange = _chart.timeScale().getVisibleRange();
      }, 300);
    }
    drawLines(data.lines, data.current_price);
    renderOrders(data.lines);
    // لا نحرك الشارت تلقائياً — المستخدم يتحكم بالموضع
    if (_symbol !== data.symbol) { _symbol = data.symbol; startPriceFeed(_symbol); }
  } catch(e) {
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('overlay').textContent   = `❌ ${e.message}`;
  }
}

// ── Timeframe switcher ────────────────────────────────────────────────────────
document.querySelectorAll('.tf-btn').forEach(btn => {
  if (btn.dataset.tf === TF) btn.classList.add('active');
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    TF = btn.dataset.tf;
    loadChart();
    startCountdown();
    if (_wsPrice) { _wsPrice.close(); _wsPrice = null; }
    if (_symbol) startPriceFeed(_symbol);
  });
});

// ── SSE ───────────────────────────────────────────────────────────────────────
function buildOrderLines(buyOrders, sellOrders, grid) {
  const lines = [];
  if (grid.center) lines.push({ price:grid.center, color:'#94A3B8', style:'dashed', label:`مركز $${grid.center}`, type:'center' });
  buyOrders.forEach(o => {
    const filled = o.status==='filled';
    lines.push({ price:o.price, color:filled?'#16A34A':'#22C55E', style:filled?'dashed':'solid', label:`شراء $${o.price}`+(filled?' ✅':''), type:'buy', filled, qty:o.qty });
  });
  sellOrders.forEach(o => {
    const filled = o.status==='filled';
    lines.push({ price:o.price, color:filled?'#DC2626':'#EF4444', style:filled?'dashed':'solid', label:`بيع $${o.price}`+(filled?' ✅':''), type:'sell', filled, qty:o.qty });
  });
  if (grid.take_profit) lines.push({ price:grid.take_profit, color:'#A855F7', style:'solid', label:`TP $${grid.take_profit}`, type:'tp' });
  if (grid.stop_loss)   lines.push({ price:grid.stop_loss,   color:'#F97316', style:'solid', label:`SL $${grid.stop_loss}`,   type:'sl' });
  return lines;
}

function startSSE() {
  if (!GRID_ID) return;
  if (_sse) { _sse.close(); _sse = null; }
  const url = `${BASE_URL}/api/grids/${GRID_ID}/stream?api_key=${encodeURIComponent(_apiKey)}`;
  _sse = new EventSource(url);
  _sse.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type !== 'grid_update') return;
      updatePriceDisplay(data.current_price);
      const lines = buildOrderLines(data.buy_orders||[], data.sell_orders||[], data);
      updateStats(lines, data);
      drawLines(lines, data.current_price);
      renderOrders(lines);
    } catch(err) {}
  };
  _sse.onerror = () => { _sse.close(); _sse = null; setTimeout(startSSE, 5000); };
}

// ── WebSocket: سعر لحظي ───────────────────────────────────────────────────────
function _tfToMin(tf) {
  return {'1m':1,'3m':3,'5m':5,'15m':15,'30m':30,'1h':60,'4h':240,'1d':1440}[tf]||15;
}

function startPriceFeed(symbol) {
  if (_wsPrice) { _wsPrice.close(); _wsPrice = null; }
  const wsSymbol = symbol.replace('/','').toLowerCase();
  _wsPrice = new WebSocket('wss://wbs.mexc.com/ws');
  _wsPrice.onopen = () => {
    _wsPrice.send(JSON.stringify({ method:'SUBSCRIPTION', params:[
      `spot@public.miniTicker.v3.api@${wsSymbol}@UTC+3`,
      `spot@public.kline.v3.api@${wsSymbol}@Min${_tfToMin(TF)}`,
    ]}));
  };
  _wsPrice.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data); const d = msg.d; if (!d) return;
      if (msg.c && msg.c.includes('miniTicker')) {
        const price = parseFloat(d.p||d.c||0);
        if (price > 0) {
          updatePriceDisplay(price);
          if (_priceLine) _candleSeries.removePriceLine(_priceLine);
          _priceLine = _candleSeries.createPriceLine({
            price, color:'#FBBF24', lineWidth:2,
            lineStyle:LightweightCharts.LineStyle.Solid,
            axisLabelVisible:true, title:`▶ ${price}`,
          });
          if (_currentCandle) {
            const u = {..._currentCandle, close:price, high:Math.max(_currentCandle.high,price), low:Math.min(_currentCandle.low,price)};
            _currentCandle = u; _candleSeries.update(u);
          }
        }
      }
      if (msg.c && msg.c.includes('kline')) {
        const k = d.k||d;
        if (k) {
          _currentCandle = { time:Math.floor((k.t||k.T||Date.now())/1000), open:parseFloat(k.o||k.O||0), high:parseFloat(k.h||k.H||0), low:parseFloat(k.l||k.L||0), close:parseFloat(k.c||k.C||0) };
          if (_currentCandle.open > 0) {
            _candleSeries.update(_currentCandle);
            // إعادة تثبيت الـ range بعد الـ update
            if (_lockedRange) {
              _chart.timeScale().setVisibleRange(_lockedRange);
            }
          }
        }
      }
    } catch(err) {}
  };
  _wsPrice.onerror = () => {};
  _wsPrice.onclose = () => { setTimeout(() => { if (_symbol) startPriceFeed(_symbol); }, 3000); };
}

// ── Countdown ─────────────────────────────────────────────────────────────────
function startCountdown() {
  if (_countdownTimer) clearInterval(_countdownTimer);
  const el = document.getElementById('candle-countdown');
  el.style.display = 'inline-block';
  _countdownTimer = setInterval(() => {
    const rem    = _tfToMin(TF)*60*1000 - (Date.now() % (_tfToMin(TF)*60*1000));
    const remSec = Math.floor(rem/1000);
    const m = Math.floor(remSec/60), s = remSec%60;
    el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    el.style.color      = remSec<=10 ? '#EF4444' : '#FBBF24';
    el.style.background = remSec<=10 ? 'rgba(239,68,68,.15)' : 'rgba(251,191,36,.12)';
  }, 500);
}

// ══════════════════════════════════════════════════════════════════════════════
// DRAG TO EDIT
// ══════════════════════════════════════════════════════════════════════════════
let _drag = {
  active:     false,
  line:       null,    // priceLine المسحوب
  data:       null,    // _data الخاص به
  origPrice:  0,
  curPrice:   0,
  startY:     0,
};

const _tooltip = document.getElementById('drag-tooltip');
const _confirm = document.getElementById('drag-confirm');

// إيجاد أقرب خط أمر مفتوح لإحداثية Y
function _findNearestLine(clientY) {
  const rect = document.getElementById('chart').getBoundingClientRect();
  const y    = clientY - rect.top;

  // قارن بالـ pixel مباشرة — أدق من مقارنة الأسعار
  let best = null, bestDist = Infinity;
  for (const pl of _orderLines) {
    const d = pl._data;
    if (!d || (d.type!=='buy' && d.type!=='sell') || d.filled) continue;
    // تحويل سعر الخط إلى إحداثية Y
    const lineY = _candleSeries.priceToCoordinate(d.price);
    if (lineY === null || lineY === undefined) continue;
    const dist = Math.abs(lineY - y);
    // نطاق 28 pixel للإمساك (مناسب للموبايل)
    if (dist < 28 && dist < bestDist) { bestDist = dist; best = pl; }
  }
  return best;
}

function _priceAtY(clientY) {
  const rect = document.getElementById('chart').getBoundingClientRect();
  const y    = clientY - rect.top;
  return _candleSeries.coordinateToPrice(y);
}

function _showTooltip(clientX, clientY, text, color) {
  const rect = document.getElementById('chart-container').getBoundingClientRect();
  _tooltip.textContent = text;
  _tooltip.style.borderColor = color;
  _tooltip.style.display = 'block';
  let x = clientX - rect.left + 12;
  let y = clientY - rect.top  - 36;
  if (x + 180 > rect.width)  x = clientX - rect.left - 190;
  if (y < 4) y = clientY - rect.top + 12;
  _tooltip.style.left = x + 'px';
  _tooltip.style.top  = y + 'px';
}

function _hideTooltip() { _tooltip.style.display = 'none'; }

function _onStart(clientX, clientY) {
  const pl = _findNearestLine(clientY);
  if (!pl) return;
  _drag.active    = true;
  _drag.line      = pl;
  _drag.data      = pl._data;
  _drag.origPrice = pl._data.price;
  _drag.curPrice  = pl._data.price;
  _drag.startY    = clientY;
  document.getElementById('chart').style.cursor = 'ns-resize';
  _hideConfirm();

  // ── تجميد الشارت: إيقاف scroll وzoom طول السحب ──────────────────
  _chart.applyOptions({
    handleScroll: false,
    handleScale:  false,
  });
}

function _onMove(clientX, clientY) {
  if (!_drag.active) {
    // hover: تلوين المؤشر إذا كان قريباً من خط
    const pl = _findNearestLine(clientY);
    document.getElementById('chart').style.cursor = pl ? 'ns-resize' : '';
    return;
  }
  const newPrice = _priceAtY(clientY);
  if (!newPrice || newPrice <= 0) return;
  _drag.curPrice = newPrice;

  // إعادة رسم الخط المسحوب فقط (بدون إعادة رسم الكل)
  _candleSeries.removePriceLine(_drag.line);
  const d = _drag.data;
  const newPl = _candleSeries.createPriceLine({
    price:     newPrice,
    color:     d.color,
    lineWidth: 2,
    lineStyle: d.type==='buy' ? LightweightCharts.LineStyle.Dashed : LightweightCharts.LineStyle.Solid,
    axisLabelVisible: true,
    title: `${d.type==='buy'?'▲':'▼'} ${d.type==='buy'?'شراء':'بيع'} ✏️`,
  });
  newPl._data = d;
  const idx = _orderLines.indexOf(_drag.line);
  if (idx !== -1) _orderLines[idx] = newPl;
  _drag.line = newPl;

  // tooltip
  const fmt = p => Number(p).toPrecision(6);
  const dir = newPrice > _drag.origPrice ? '▲' : '▼';
  const pct = (((newPrice - _drag.origPrice) / _drag.origPrice) * 100).toFixed(3);
  _showTooltip(clientX, clientY,
    `${dir} $${fmt(newPrice)}  (${pct}%)`,
    d.type==='buy' ? '#22C55E' : '#EF4444'
  );
}

function _onEnd() {
  if (!_drag.active) return;
  _drag.active = false;
  document.getElementById('chart').style.cursor = '';
  _hideTooltip();

  // ── إعادة تفعيل الشارت ───────────────────────────────────────────
  _chart.applyOptions({
    handleScroll: true,
    handleScale:  true,
  });

  const diff = Math.abs(_drag.curPrice - _drag.origPrice) / _drag.origPrice;
  // إظهار الـ menu دائماً عند الإفلات (حتى بدون حركة كبيرة)
  _showConfirm(diff >= 0.0005);
}

function _showConfirm(moved) {
  const d    = _drag.data;
  const side = d.type==='buy' ? '🟢 شراء' : '🔴 بيع';
  const fmt  = p => Number(p).toPrecision(6);
  document.getElementById('dc-title').textContent = `${side}  —  $${fmt(_drag.origPrice)}`;

  if (moved) {
    document.getElementById('dc-prices').innerHTML =
      `السعر الجديد: <span style="color:${d.type==='buy'?'#22C55E':'#EF4444'};font-weight:700">$${fmt(_drag.curPrice)}</span>`;
    document.getElementById('dc-ok').style.display   = 'block';
    document.getElementById('dc-edit').style.display = 'none';
  } else {
    document.getElementById('dc-prices').innerHTML = '';
    document.getElementById('dc-ok').style.display   = 'none';
    document.getElementById('dc-edit').style.display = 'block';
  }
  _confirm.style.display = 'block';
}

function _hideConfirm() { _confirm.style.display = 'none'; }

document.getElementById('dc-ok').addEventListener('click', async () => {
  _hideConfirm();
  await _applyEdit(_drag.data, _drag.origPrice, _drag.curPrice);
});

document.getElementById('dc-edit').addEventListener('click', () => {
  _hideConfirm();
  // فتح input لإدخال سعر يدوي
  const fmt = p => Number(p).toPrecision(6);
  const val = prompt(`أدخل السعر الجديد لأمر ${_drag.data.type==='buy'?'الشراء':'البيع'}:`, fmt(_drag.origPrice));
  if (!val) return;
  const newP = parseFloat(val);
  if (!newP || newP <= 0) { alert('سعر غير صحيح'); return; }
  _drag.curPrice = newP;
  _drag.data.price = newP;
  drawLines(_lastLines.map(l =>
    (l.type===_drag.data.type && Math.abs(l.price-_drag.origPrice)/_drag.origPrice < 0.001)
      ? {...l, price: newP} : l
  ), _lastPrice);
  _applyEdit(_drag.data, _drag.origPrice, newP);
});

document.getElementById('dc-del').addEventListener('click', async () => {
  _hideConfirm();
  const d = _drag.data;
  const side = d.type==='buy' ? 'شراء' : 'بيع';
  if (!confirm(`حذف أمر ${side} بسعر $${Number(d.price).toPrecision(6)}؟`)) return;
  await _configReady;
  try {
    const res = await fetch(`${BASE_URL}/api/grids/${GRID_ID}/order/cancel`, {
      method: 'POST',
      headers: apiHeaders(),
      body: JSON.stringify({ side: d.type, price: _drag.origPrice }),
    });
    const data = await res.json();
    if (data.ok) { loadChart(); }
    else { alert('❌ فشل الحذف: ' + (data.error||'خطأ')); }
  } catch(e) { alert('❌ خطأ في الاتصال'); }
});

document.getElementById('dc-cancel').addEventListener('click', () => {
  _hideConfirm();
  _drag.data.price = _drag.origPrice;
  drawLines(_lastLines, _lastPrice);
  _drag.line = null;
});

async function _applyEdit(orderData, oldPrice, newPrice) {
  await _configReady;
  try {
    const res = await fetch(`${BASE_URL}/api/grids/${GRID_ID}/order/edit`, {
      method: 'POST',
      headers: apiHeaders(),
      body: JSON.stringify({ side: orderData.type, old_price: oldPrice, new_price: newPrice }),
    });
    const data = await res.json();
    if (data.ok) {
      loadChart();
    } else {
      alert('❌ فشل التعديل: ' + (data.error || 'خطأ'));
      orderData.price = oldPrice;
      drawLines(_lastLines, _lastPrice);
    }
  } catch(e) {
    alert('❌ خطأ في الاتصال');
    orderData.price = oldPrice;
    drawLines(_lastLines, _lastPrice);
  }
}

// ── ربط أحداث الماوس واللمس ──────────────────────────────────────────────────
const _chartEl = document.getElementById('chart');

_chartEl.addEventListener('mousedown', e => {
  const pl = _findNearestLine(e.clientY);
  if (pl) {
    e.stopPropagation();
    e.preventDefault();
    // تجميد فوري قبل _onStart
    _chart.applyOptions({ handleScroll: false, handleScale: false });
  }
  _onStart(e.clientX, e.clientY);
});
_chartEl.addEventListener('mousemove',  e => _onMove(e.clientX, e.clientY));
_chartEl.addEventListener('mouseup',    () => _onEnd());
_chartEl.addEventListener('mouseleave', () => { if (_drag.active) _onEnd(); _hideTooltip(); });

_chartEl.addEventListener('touchstart', e => {
  const t  = e.touches[0];
  const pl = _findNearestLine(t.clientY);
  if (pl) {
    _chart.applyOptions({ handleScroll: false, handleScale: false });
  }
  _onStart(t.clientX, t.clientY);
}, { passive: true });

_chartEl.addEventListener('touchmove', e => {
  if (_drag.active) e.preventDefault();
  const t = e.touches[0];
  _onMove(t.clientX, t.clientY);
}, { passive: false });

_chartEl.addEventListener('touchend', () => _onEnd());

// ── Auto refresh ──────────────────────────────────────────────────────────────
function startAutoRefresh() {
  if (_refreshTimer) clearInterval(_refreshTimer);
  _refreshTimer = setInterval(loadChart, 30_000);
}

// ── Telegram WebApp ───────────────────────────────────────────────────────────
if (window.Telegram?.WebApp) {
  const tg = window.Telegram.WebApp;
  tg.ready(); tg.expand();
  tg.setHeaderColor(isDark ? '#0A0F1F' : '#F0F4FF');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initChart();
loadChart().then(() => {
  _configReady.then(startSSE);
  startCountdown();
});
startAutoRefresh();

</script>
</body>
