<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Grid Chart</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<link rel="stylesheet" href="/webapp/style.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .chart-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chart-header .back-btn {
    background: none;
    border: none;
    color: var(--text);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .chart-header .back-btn:hover { background: var(--border); }
  .chart-title  { font-weight: 700; font-size: 1rem; flex: 1; }
  .chart-price  { font-size: .9rem; font-weight: 600; }
  .chart-price.up   { color: var(--green); }
  .chart-price.down { color: var(--red); }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 8px 14px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    font-size: .75rem;
    color: var(--text-muted);
    flex-shrink: 0;
    overflow-x: auto;
    white-space: nowrap;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat strong { color: var(--text); font-size: .82rem; }

  /* ── Timeframe tabs ── */
  .tf-bar {
    display: flex;
    gap: 4px;
    padding: 6px 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tf-btn {
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    font-size: .78rem;
    cursor: pointer;
  }
  .tf-btn.active {
    background: var(--accent, #3B82F6);
    color: #fff;
    border-color: transparent;
  }

  /* ── Chart container ── */
  #chart-container {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  #chart { width: 100%; height: 100%; }

  /* ── Legend overlay ── */
  .legend {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(4px);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: .72rem;
    line-height: 1.8;
    pointer-events: none;
    z-index: 10;
  }
  .legend-row { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 3px; border-radius: 2px; flex-shrink: 0; }

  /* ── Orders panel ── */
  .orders-panel {
    flex-shrink: 0;
    max-height: 160px;
    overflow-y: auto;
    border-top: 1px solid var(--border);
    background: var(--card);
  }
  .orders-title {
    padding: 6px 14px;
    font-size: .78rem;
    font-weight: 600;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--card);
  }
  .order-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 14px;
    font-size: .78rem;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .order-row .side-buy  { color: var(--green); font-weight: 600; }
  .order-row .side-sell { color: var(--red);   font-weight: 600; }
  .order-row .filled    { opacity: .5; text-decoration: line-through; }

  /* ── Loading / error ── */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .9rem;
    color: var(--text-muted);
    background: var(--bg);
    z-index: 20;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="chart-header">
  <button class="back-btn" onclick="history.back()">◀</button>
  <span class="chart-title" id="chart-title">Grid Chart</span>
  <span class="chart-price" id="chart-price">—</span>
  <span id="candle-countdown" style="
    font-size:.72rem;color:#FBBF24;font-family:monospace;
    background:rgba(251,191,36,.12);padding:2px 7px;border-radius:6px;
    min-width:48px;text-align:center;display:none;
  ">—</span>
  <button class="icon-btn" id="btn-refresh" onclick="loadChart()" title="تحديث">↻</button>
</div>

<!-- Stats -->
<div class="stats-bar" id="stats-bar">
  <div class="stat"><span>الأوامر</span><strong id="s-steps">—</strong></div>
  <div class="stat"><span>ربح/خطوة</span><strong id="s-step-pct">—</strong></div>
  <div class="stat"><span>صفقات منفذة</span><strong id="s-trades">—</strong></div>
  <div class="stat"><span>الحد العلوي</span><strong id="s-upper">—</strong></div>
  <div class="stat"><span>الحد السفلي</span><strong id="s-lower">—</strong></div>
  <div class="stat"><span>🟢 شراء</span><strong id="s-buys">—</strong></div>
  <div class="stat"><span>🔴 بيع</span><strong id="s-sells">—</strong></div>
  <div class="stat"><span>✅ منفذ</span><strong id="s-filled">—</strong></div>
</div>

<!-- Timeframe -->
<div class="tf-bar">
  <button class="tf-btn" data-tf="1m">1د</button>
  <button class="tf-btn active" data-tf="15m">15د</button>
  <button class="tf-btn" data-tf="1h">1س</button>
  <button class="tf-btn" data-tf="4h">4س</button>
  <button class="tf-btn" data-tf="1d">يوم</button>
</div>

<!-- Chart -->
<div id="chart-container">
  <div id="chart"></div>
  <div class="overlay" id="overlay">⏳ جاري التحميل...</div>
  <div class="legend" id="legend" style="display:none">
    <div class="legend-row"><div class="legend-dot" style="background:#22C55E"></div> شراء مفتوح</div>
    <div class="legend-row"><div class="legend-dot" style="background:#16A34A;opacity:.5"></div> شراء منفذ</div>
    <div class="legend-row"><div class="legend-dot" style="background:#EF4444"></div> بيع مفتوح</div>
    <div class="legend-row"><div class="legend-dot" style="background:#DC2626;opacity:.5"></div> بيع منفذ</div>
    <div class="legend-row"><div class="legend-dot" style="background:#94A3B8"></div> مركز</div>
    <div class="legend-row"><div class="legend-dot" style="background:#A855F7"></div> Take Profit</div>
    <div class="legend-row"><div class="legend-dot" style="background:#F97316"></div> Stop Loss</div>
  </div>
</div>

<!-- Orders panel -->
<div class="orders-panel">
  <div class="orders-title">الأوامر</div>
  <div id="orders-list"></div>
</div>

<script>
'use strict';

// ── Config ────────────────────────────────────────────────────────────────────
const BASE_URL = window.location.origin;
const params   = new URLSearchParams(location.search);
const GRID_ID  = parseInt(params.get('id') || '0');
let   TF       = params.get('tf') || '15m';
let   _apiKey  = '';
let   _chart, _candleSeries, _priceLine, _orderLines = [];
let   _refreshTimer = null;
let   _lastPrice = 0;
let   _currentCandle = null;   // الشمعة الحالية (تتحدث لحظياً)
let   _wsPrice = null;         // WebSocket للسعر اللحظي
let   _countdownTimer = null;  // مؤقت العداد التنازلي
let   _symbol = '';            // رمز العملة الحالي

// ── Auth ──────────────────────────────────────────────────────────────────────
const _configReady = fetch(BASE_URL + '/api/config')
  .then(r => r.json()).then(d => { _apiKey = d.api_key || ''; }).catch(() => {});

function apiHeaders() {
  const h = { 'Content-Type': 'application/json' };
  if (_apiKey) h['X-API-Key'] = _apiKey;
  return h;
}
async function apiFetch(path) {
  await _configReady;
  const res  = await fetch(BASE_URL + path, { headers: apiHeaders() });
  const data = await res.json().catch(() => ({ error: 'invalid response' }));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ── Theme ─────────────────────────────────────────────────────────────────────
const isDark = (localStorage.getItem('theme') || 'dark') === 'dark';
const THEME = {
  layout:     { background: { color: isDark ? '#0A0F1F' : '#F0F4FF' }, textColor: isDark ? '#94A3B8' : '#475569' },
  grid:       { vertLines: { color: isDark ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.05)' },
                horzLines: { color: isDark ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.05)' } },
  crosshair:  { mode: 1 },
  timeScale:  { borderColor: isDark ? '#1E293B' : '#CBD5E1', timeVisible: true, secondsVisible: false },
  rightPriceScale: { borderColor: isDark ? '#1E293B' : '#CBD5E1' },
};

// ── Init chart ────────────────────────────────────────────────────────────────
function initChart() {
  const container = document.getElementById('chart');
  _chart = LightweightCharts.createChart(container, {
    ...THEME,
    width:  container.clientWidth,
    height: container.clientHeight,
    localization: { locale: 'ar-SA' },
  });

  _candleSeries = _chart.addCandlestickSeries({
    upColor:          '#22C55E',
    downColor:        '#EF4444',
    borderUpColor:    '#22C55E',
    borderDownColor:  '#EF4444',
    wickUpColor:      '#22C55E',
    wickDownColor:    '#EF4444',
  });

  // Resize observer
  new ResizeObserver(() => {
    _chart.applyOptions({
      width:  container.clientWidth,
      height: container.clientHeight,
    });
  }).observe(container);
}

// ── Draw order lines ──────────────────────────────────────────────────────────
function drawLines(lines, currentPrice) {
  // Remove old lines
  _orderLines.forEach(l => _candleSeries.removePriceLine(l));
  _orderLines = [];

  // Current price line
  if (_priceLine) _candleSeries.removePriceLine(_priceLine);
  _priceLine = _candleSeries.createPriceLine({
    price:     currentPrice,
    color:     '#FBBF24',
    lineWidth: 2,
    lineStyle: LightweightCharts.LineStyle.Solid,
    axisLabelVisible: true,
    title: `▶ ${currentPrice}`,
  });

  // Order lines
  lines.forEach(l => {
    const lineStyle = l.style === 'dashed'
      ? LightweightCharts.LineStyle.Dashed
      : LightweightCharts.LineStyle.Solid;

    const pl = _candleSeries.createPriceLine({
      price:     l.price,
      color:     l.filled ? l.color + '88' : l.color,
      lineWidth: l.type === 'center' ? 1 : (l.type === 'tp' || l.type === 'sl' ? 2 : 1),
      lineStyle: lineStyle,
      axisLabelVisible: true,
      title: l.label,
    });
    _orderLines.push(pl);
  });
}

// ── Render orders list ────────────────────────────────────────────────────────
function renderOrders(lines) {
  const el = document.getElementById('orders-list');
  const orders = lines.filter(l => l.type === 'buy' || l.type === 'sell');
  orders.sort((a, b) => b.price - a.price);

  if (!orders.length) {
    el.innerHTML = '<div style="padding:10px 14px;color:var(--text-muted);font-size:.8rem">لا توجد أوامر</div>';
    return;
  }

  el.innerHTML = orders.map(o => {
    const price   = o.price ? Number(o.price).toPrecision(6) : '—';
    const qty     = o.qty   ? Number(o.qty).toPrecision(4)   : '—';
    const side    = o.type === 'buy' ? '🟢 شراء' : '🔴 بيع';
    const bgColor = o.filled
      ? 'rgba(34,197,94,.08)'
      : (o.type === 'buy' ? 'rgba(34,197,94,.03)' : 'rgba(239,68,68,.03)');
    const status  = o.filled
      ? `<span style="color:var(--green);font-size:.75rem">✅ منفذ</span>`
      : `<span style="color:var(--text-muted);font-size:.75rem">⏳ مفتوح</span>`;
    return `<div class="order-row" style="background:${bgColor}">
      <span class="side-${o.type}">${side}</span>
      <span style="font-family:monospace;font-weight:600;font-size:.82rem">$${price}</span>
      <span style="color:var(--text-muted);font-size:.72rem">${qty}</span>
      ${status}
    </div>`;
  }).join('');
}

// ── Update price display ──────────────────────────────────────────────────────
function updatePriceDisplay(price) {
  const el = document.getElementById('chart-price');
  el.textContent = `$${price}`;
  if (_lastPrice) {
    el.className = 'chart-price ' + (price >= _lastPrice ? 'up' : 'down');
  }
  _lastPrice = price;
}

// ── Load chart data ───────────────────────────────────────────────────────────
async function loadChart() {
  if (!GRID_ID) {
    document.getElementById('overlay').textContent = '❌ لم يتم تحديد الشبكة';
    return;
  }

  document.getElementById('btn-refresh').classList.add('spin');

  try {
    const data = await apiFetch(`/api/grids/${GRID_ID}/chart?tf=${TF}`);

    // Hide overlay
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('legend').style.display  = 'block';

    // Update header
    document.getElementById('chart-title').textContent = `🔲 ${data.symbol}`;
    // حفظ الرمز وتشغيل WebSocket للسعر اللحظي
    if (_symbol !== data.symbol) {
      _symbol = data.symbol;
      startPriceFeed(_symbol);
    }
    updatePriceDisplay(data.current_price);

    // Update stats
    const orderLines = data.lines.filter(l => l.type === 'buy' || l.type === 'sell');
    const buyCount    = orderLines.filter(l => l.type === 'buy'  && !l.filled).length;
    const sellCount   = orderLines.filter(l => l.type === 'sell' && !l.filled).length;
    const filledCount = orderLines.filter(l => l.filled).length;
    document.getElementById('s-steps').textContent    = orderLines.length + ' أمر';
    document.getElementById('s-step-pct').textContent = data.step_pct + '%';
    document.getElementById('s-trades').textContent   = data.trades;
    document.getElementById('s-upper').textContent    = '$' + data.upper;
    document.getElementById('s-lower').textContent    = '$' + data.lower;
    document.getElementById('s-buys').textContent     = buyCount;
    document.getElementById('s-sells').textContent    = sellCount;
    document.getElementById('s-filled').textContent   = filledCount;

    // Set candles
    _candleSeries.setData(data.candles);

    // Draw lines
    drawLines(data.lines, data.current_price);

    // Render orders list
    renderOrders(data.lines);

    // Fit visible range to last 100 candles
    _chart.timeScale().scrollToRealTime();

  } catch(e) {
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('overlay').textContent   = `❌ ${e.message}`;
  } finally {
    document.getElementById('btn-refresh').classList.remove('spin');
  }
}

// ── Timeframe switcher ────────────────────────────────────────────────────────
document.querySelectorAll('.tf-btn').forEach(btn => {
  if (btn.dataset.tf === TF) btn.classList.add('active');
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    TF = btn.dataset.tf;
    loadChart();
    startCountdown();
    if (_wsPrice) { _wsPrice.close(); _wsPrice = null; }
    if (_symbol) startPriceFeed(_symbol);
  });
});

// ── SSE: تحديث لحظي عبر Server-Sent Events ───────────────────────────────────
let _sse = null;

function buildOrderLines(buyOrders, sellOrders, grid) {
  const lines = [];

  // خط المركز
  if (grid.center) {
    lines.push({
      price: grid.center, color: '#94A3B8', style: 'dashed',
      label: `مركز $${grid.center}`, type: 'center',
    });
  }

  buyOrders.forEach(o => {
    const filled = o.status === 'filled';
    lines.push({
      price: o.price,
      color: filled ? '#16A34A' : '#22C55E',
      style: filled ? 'dashed' : 'solid',
      label: `شراء $${o.price}` + (filled ? ' ✅' : ''),
      type: 'buy', filled, qty: o.qty,
    });
  });

  sellOrders.forEach(o => {
    const filled = o.status === 'filled';
    lines.push({
      price: o.price,
      color: filled ? '#DC2626' : '#EF4444',
      style: filled ? 'dashed' : 'solid',
      label: `بيع $${o.price}` + (filled ? ' ✅' : ''),
      type: 'sell', filled, qty: o.qty,
    });
  });

  if (grid.take_profit) {
    lines.push({ price: grid.take_profit, color: '#A855F7', style: 'solid', label: `TP $${grid.take_profit}`, type: 'tp' });
  }
  if (grid.stop_loss) {
    lines.push({ price: grid.stop_loss, color: '#F97316', style: 'solid', label: `SL $${grid.stop_loss}`, type: 'sl' });
  }
  return lines;
}

function startSSE() {
  if (!GRID_ID) return;
  if (_sse) { _sse.close(); _sse = null; }

  // EventSource لا يدعم headers — نمرر api_key في query string
  const url = `${BASE_URL}/api/grids/${GRID_ID}/stream?api_key=${encodeURIComponent(_apiKey)}`;
  _sse = new EventSource(url);

  _sse.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type !== 'grid_update') return;

      // تحديث السعر
      updatePriceDisplay(data.current_price);

      // تحديث الإحصائيات
      const bo = data.buy_orders  || [];
      const so = data.sell_orders || [];
      const totalOrders  = bo.length + so.length;
      const buyOpen      = bo.filter(o => o.status !== 'filled').length;
      const sellOpen     = so.filter(o => o.status !== 'filled').length;
      const filledOrders = [...bo, ...so].filter(o => o.status === 'filled').length;
      document.getElementById('s-steps').textContent  = totalOrders + ' أمر';
      document.getElementById('s-trades').textContent = data.total_trades;
      document.getElementById('s-upper').textContent  = '$' + data.upper;
      document.getElementById('s-lower').textContent  = '$' + data.lower;
      document.getElementById('s-buys').textContent   = buyOpen;
      document.getElementById('s-sells').textContent  = sellOpen;
      document.getElementById('s-filled').textContent = filledOrders;

      // إعادة رسم خطوط الأوامر فقط (بدون إعادة تحميل الشمعات)
      const lines = buildOrderLines(data.buy_orders || [], data.sell_orders || [], data);
      drawLines(lines, data.current_price);
      renderOrders(lines);

    } catch (err) {
      console.warn('SSE parse error:', err);
    }
  };

  _sse.onerror = () => {
    // إعادة الاتصال تلقائياً بعد 5 ثوانٍ عند الانقطاع
    console.warn('SSE disconnected — reconnecting in 5s');
    _sse.close();
    _sse = null;
    setTimeout(startSSE, 5000);
  };
}

// ── Auto refresh every 30s (fallback إذا لم يعمل SSE) ────────────────────────
function startAutoRefresh() {
  if (_refreshTimer) clearInterval(_refreshTimer);
  _refreshTimer = setInterval(loadChart, 30_000);
}

// ── Telegram WebApp ───────────────────────────────────────────────────────────
if (window.Telegram?.WebApp) {
  const tg = window.Telegram.WebApp;
  tg.ready(); tg.expand();
  const theme = localStorage.getItem('theme') || 'dark';
  tg.setHeaderColor(theme === 'dark' ? '#0A0F1F' : '#F0F4FF');
}

// ── WebSocket: سعر لحظي من MEXC ──────────────────────────────────────────────
function startPriceFeed(symbol) {
  if (_wsPrice) { _wsPrice.close(); _wsPrice = null; }

  // تحويل BTC/USDT → btcusdt
  const wsSymbol = symbol.replace('/', '').toLowerCase();
  const url = `wss://wbs.mexc.com/ws`;

  _wsPrice = new WebSocket(url);

  _wsPrice.onopen = () => {
    // الاشتراك في ticker + kline للشمعة الحالية
    _wsPrice.send(JSON.stringify({
      method: 'SUBSCRIPTION',
      params: [
        `spot@public.miniTicker.v3.api@${wsSymbol}@UTC+3`,
        `spot@public.kline.v3.api@${wsSymbol}@Min${_tfToMin(TF)}`,
      ]
    }));
  };

  _wsPrice.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      const d   = msg.d;
      if (!d) return;

      // ── ticker: سعر لحظي ──────────────────────────────────────────────────
      if (msg.c && msg.c.includes('miniTicker')) {
        const price = parseFloat(d.p || d.c || 0);
        if (price > 0) {
          updatePriceDisplay(price);
          // تحديث خط السعر الحالي على الشارت
          if (_priceLine) {
            _candleSeries.removePriceLine(_priceLine);
          }
          _priceLine = _candleSeries.createPriceLine({
            price, color: '#FBBF24', lineWidth: 2,
            lineStyle: LightweightCharts.LineStyle.Solid,
            axisLabelVisible: true,
            title: `▶ ${price}`,
          });
          // تحديث الشمعة الحالية (close يتغير مع كل tick)
          if (_currentCandle) {
            const updated = { ..._currentCandle, close: price,
              high: Math.max(_currentCandle.high, price),
              low:  Math.min(_currentCandle.low,  price),
            };
            _currentCandle = updated;
            _candleSeries.update(updated);
          }
        }
      }

      // ── kline: بيانات الشمعة الحالية ─────────────────────────────────────
      if (msg.c && msg.c.includes('kline')) {
        const k = d.k || d;
        if (k) {
          _currentCandle = {
            time:  Math.floor((k.t || k.T || Date.now()) / 1000),
            open:  parseFloat(k.o || k.O || 0),
            high:  parseFloat(k.h || k.H || 0),
            low:   parseFloat(k.l || k.L || 0),
            close: parseFloat(k.c || k.C || 0),
          };
          if (_currentCandle.open > 0) {
            _candleSeries.update(_currentCandle);
          }
        }
      }
    } catch(err) { /* تجاهل أخطاء parse */ }
  };

  _wsPrice.onerror = () => {};
  _wsPrice.onclose = () => {
    // إعادة الاتصال بعد 3 ثوانٍ
    setTimeout(() => { if (_symbol) startPriceFeed(_symbol); }, 3000);
  };
}

// تحويل timeframe إلى دقائق للـ WebSocket
function _tfToMin(tf) {
  const map = { '1m':1, '3m':3, '5m':5, '15m':15, '30m':30, '1h':60, '4h':240, '1d':1440 };
  return map[tf] || 15;
}

// ── عداد تنازلي لإغلاق الشمعة ────────────────────────────────────────────────
function startCountdown() {
  if (_countdownTimer) clearInterval(_countdownTimer);
  const el = document.getElementById('candle-countdown');
  if (!el) return;
  el.style.display = 'inline-block';

  _countdownTimer = setInterval(() => {
    const now      = Date.now();
    const minMs    = _tfToMin(TF) * 60 * 1000;
    const rem      = minMs - (now % minMs);   // الوقت المتبقي حتى إغلاق الشمعة
    const remSec   = Math.floor(rem / 1000);
    const m        = Math.floor(remSec / 60);
    const s        = remSec % 60;
    el.textContent = `${m}:${s.toString().padStart(2,'0')}`;

    // تلوين أحمر عند آخر 10 ثوانٍ
    el.style.color = remSec <= 10 ? '#EF4444' : '#FBBF24';
    el.style.background = remSec <= 10 ? 'rgba(239,68,68,.15)' : 'rgba(251,191,36,.12)';
  }, 500);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initChart();
loadChart().then(() => {
  _configReady.then(startSSE);
  // تشغيل العداد التنازلي
  startCountdown();
});
startAutoRefresh();
</script>
