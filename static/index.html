<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEXC Portfolio Rebalancer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box}
body{background:#030712;color:#f9fafb;font-family:system-ui,sans-serif;margin:0;padding:0}
.card{background:#111827;border:1px solid #1f2937;border-radius:1rem;padding:1.25rem}
.btn{background:#f0b90b;color:#000;font-weight:700;padding:.5rem 1.25rem;border-radius:.75rem;border:none;cursor:pointer;transition:background .2s,transform .1s}
.btn:hover{background:#d4a009;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-ghost{background:#1f2937;color:#f9fafb;font-weight:600;padding:.5rem 1rem;border-radius:.75rem;border:1px solid #374151;cursor:pointer;transition:all .2s}
.btn-ghost:hover{background:#374151;border-color:#4b5563}
.btn-danger{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3);padding:.3rem .6rem;border-radius:.5rem;cursor:pointer;transition:all .2s}
.btn-danger:hover{background:rgba(239,68,68,.3)}
.btn-sm{padding:.3rem .75rem;font-size:.8rem;border-radius:.5rem}
.badge{padding:.2rem .6rem;border-radius:.4rem;font-size:.75rem;font-weight:700}
.tag-mode{background:rgba(240,185,11,.15);color:#f0b90b}
.tag-paper{background:rgba(168,85,247,.15);color:#c084fc}
.tag-running{background:rgba(74,222,128,.15);color:#4ade80}
.tag-stopped{background:rgba(156,163,175,.15);color:#9ca3af}
table{width:100%;border-collapse:collapse;font-size:.875rem}
th{color:#9ca3af;text-align:right;padding:.5rem .4rem;border-bottom:1px solid #1f2937;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em}
td{padding:.65rem .4rem;border-bottom:1px solid rgba(31,41,55,.5)}
tr:hover td{background:rgba(31,41,55,.3)}
.dev-green{color:#4ade80;font-weight:700}
.dev-yellow{color:#facc15;font-weight:700}
.dev-red{color:#f87171;font-weight:700}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;align-items:center;justify-content:center;padding:1rem}
.modal.open{display:flex}
.modal-box{background:#111827;border:1px solid #374151;border-radius:1.25rem;padding:1.5rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
input,select{background:#1f2937;border:1px solid #374151;border-radius:.75rem;padding:.5rem .75rem;color:#f9fafb;width:100%;font-size:.875rem;transition:border-color .2s}
input:focus,select:focus{outline:none;border-color:#f0b90b}
label.field-label{font-size:.75rem;color:#9ca3af;display:block;margin-bottom:.3rem;font-weight:500}
.paper-banner{background:linear-gradient(90deg,rgba(240,185,11,.2),rgba(240,185,11,.1));border-bottom:2px solid #f0b90b;padding:.6rem 1rem;text-align:center;font-weight:700;color:#f0b90b;font-size:.9rem;display:none}
.paper-banner.show{display:block}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.asset-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.asset-row input[type=text]{width:5rem;flex-shrink:0}
.asset-row input[type=number]{flex:1}
.asset-row .usdt-val{width:5rem;flex-shrink:0;font-size:.8rem;color:#9ca3af;text-align:center;background:#0f172a;border:1px solid #1f2937;border-radius:.5rem;padding:.4rem .3rem}
</style>
</head>
<body>

<!-- Paper Trading Banner -->
<div class="paper-banner" id="paper-banner">⚠️ وضع تجريبي — أموال وهمية فقط</div>

<div class="max-w-5xl mx-auto p-4 space-y-5">

<!-- Header -->
<div class="flex flex-wrap items-center justify-between gap-3 pt-2">
  <div>
    <div class="flex items-center gap-3 flex-wrap">
      <h1 id="bot-name" class="text-xl font-bold">MEXC Portfolio</h1>
      <div class="flex gap-2 flex-wrap" id="badges"></div>
    </div>
    <p id="last-update" class="text-xs mt-1" style="color:#6b7280">آخر تحديث: —</p>
  </div>
  <div class="flex gap-2 flex-wrap">
    <button class="btn-ghost btn-sm" id="btn-toggle" onclick="toggleBot()">▶️ تشغيل</button>
    <button class="btn btn-sm" onclick="triggerRebalance()" id="btn-rebalance">⚖️ Rebalance</button>
    <button class="btn-ghost btn-sm" onclick="openHistory()">📊 السجل</button>
    <button class="btn-ghost btn-sm" onclick="exportCSV()">📥 CSV</button>
    <button class="btn-ghost btn-sm" onclick="openSettings()">⚙️ إعدادات</button>
    <button class="btn-ghost btn-sm" onclick="loadAll()">🔄</button>
  </div>
</div>

<!-- KPIs -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-3">
  <div class="card">
    <p style="color:#9ca3af;font-size:.75rem">إجمالي المحفظة</p>
    <p id="kpi-total" class="text-2xl font-bold mt-1">—</p>
    <p id="kpi-last-rebalance" style="font-size:.7rem;color:#6b7280;margin-top:.25rem">آخر rebalance: —</p>
  </div>
  <div class="card">
    <p style="color:#9ca3af;font-size:.75rem">الربح / الخسارة</p>
    <p id="kpi-pnl" class="text-2xl font-bold mt-1">—</p>
    <p id="kpi-pnl-pct" style="font-size:.75rem"></p>
  </div>
  <div class="card">
    <p style="color:#9ca3af;font-size:.75rem">عدد الأصول</p>
    <p id="kpi-assets" class="text-2xl font-bold mt-1">—</p>
  </div>
  <div class="card">
    <p style="color:#9ca3af;font-size:.75rem">وضع التشغيل</p>
    <p id="kpi-mode" class="text-lg font-bold mt-1">—</p>
    <p id="kpi-threshold" style="font-size:.7rem;color:#6b7280;margin-top:.25rem"></p>
  </div>
</div>

<!-- Charts + Table -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
  <div class="card">
    <p style="color:#9ca3af;font-size:.75rem;margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.05em">توزيع الأصول</p>
    <canvas id="pie-chart" height="200"></canvas>
  </div>
  <div class="card">
    <p style="color:#9ca3af;font-size:.75rem;margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.05em">أداء المحفظة</p>
    <canvas id="line-chart" height="200"></canvas>
  </div>
</div>

<!-- Assets Detail Table -->
<div class="card">
  <p style="color:#9ca3af;font-size:.75rem;margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.05em">تفاصيل الأصول</p>
  <div style="overflow-x:auto">
    <table>
      <thead><tr><th>الأصل</th><th>السعر</th><th>القيمة</th><th>الحالي%</th><th>الهدف%</th><th>الانحراف</th></tr></thead>
      <tbody id="assets-table"></tbody>
    </table>
  </div>
</div>

<!-- Big Rebalance Button -->
<div style="text-align:center;padding:1rem 0">
  <button class="btn" style="font-size:1.1rem;padding:.85rem 2.5rem;border-radius:1rem" onclick="triggerRebalance()" id="btn-rebalance2">
    🔄 Rebalance يدوي
  </button>
</div>

</div>

<!-- Settings Modal -->
<div class="modal" id="settings-modal">
  <div class="modal-box">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-bold text-lg">⚙️ الإعدادات</h2>
      <button onclick="closeSettings()" style="color:#9ca3af;font-size:1.25rem;background:none;border:none;cursor:pointer">✕</button>
    </div>
    <div id="settings-body" class="space-y-4"></div>
    <button class="btn w-full mt-4" onclick="saveSettings()">💾 حفظ الإعدادات</button>
  </div>
</div>

<!-- History Modal -->
<div class="modal" id="history-modal">
  <div class="modal-box" style="max-width:640px">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-bold text-lg">📊 سجل العمليات</h2>
      <button onclick="closeHistory()" style="color:#9ca3af;font-size:1.25rem;background:none;border:none;cursor:pointer">✕</button>
    </div>
    <div id="history-body"></div>
  </div>
</div>

<script>
const COLORS=['#f0b90b','#3b82f6','#10b981','#8b5cf6','#ef4444','#f97316','#06b6d4','#ec4899','#84cc16','#a78bfa'];
let pieChart,lineChart,currentCfg=null,_threshold=null,_botRunning=false,_lastUpdate=null;

async function api(path,opts={}){
  const r=await fetch(path,opts);
  if(!r.ok){const t=await r.text();throw new Error(t);}
  return r.json();
}

async function loadAll(){
  try{
    const [status,snaps]=await Promise.all([
      api('/api/status'),
      api('/api/snapshots?limit=60'),
    ]);
    renderStatus(status);
    renderCharts(status,snaps);
    _lastUpdate=new Date();
    updateLastUpdateText();
  }catch(e){console.error(e);}
  loadBotStatus();
}

function updateLastUpdateText(){
  if(!_lastUpdate)return;
  const diff=Math.round((new Date()-_lastUpdate)/1000);
  const txt=diff<60?`منذ ${diff} ثانية`:diff<3600?`منذ ${Math.round(diff/60)} دقيقة`:`منذ ${Math.round(diff/3600)} ساعة`;
  document.getElementById('last-update').textContent='آخر تحديث: '+txt+' — '+_lastUpdate.toLocaleTimeString('ar-EG');
}

function renderStatus(s){
  document.getElementById('bot-name').textContent=s.bot_name||'MEXC Portfolio';
  const badges=document.getElementById('badges');
  badges.innerHTML=`<span class="badge tag-mode">${s.mode}</span>`;
  if(s.paper_trading){
    badges.innerHTML+=`<span class="badge tag-paper">🧪 Paper</span>`;
    document.getElementById('paper-banner').classList.add('show');
  } else {
    document.getElementById('paper-banner').classList.remove('show');
  }
  if(s.warning) badges.innerHTML+=`<span class="badge" style="background:rgba(251,191,36,.1);color:#fbbf24;font-size:.7rem">${s.warning}</span>`;

  document.getElementById('kpi-total').textContent=(s.total_usdt||0).toFixed(2)+' USDT';
  document.getElementById('kpi-last-rebalance').textContent='آخر rebalance: '+(s.last_rebalance||'—');

  const pnl=s.pnl||{};
  const pos=(pnl.pnl_usdt||0)>=0;
  const sign=pos?'+':'';
  const pnlEl=document.getElementById('kpi-pnl');
  pnlEl.textContent=sign+(pnl.pnl_usdt||0).toFixed(2)+' USDT';
  pnlEl.style.color=pos?'#4ade80':'#f87171';
  const pctEl=document.getElementById('kpi-pnl-pct');
  pctEl.textContent=sign+(pnl.pnl_pct||0).toFixed(2)+'%';
  pctEl.style.color=pos?'#4ade80':'#f87171';

  document.getElementById('kpi-assets').textContent=(s.assets||[]).length;
  document.getElementById('kpi-mode').textContent=s.mode||'—';

  const prop=s.rebalance_config||{};
  if(s.mode==='proportional') document.getElementById('kpi-threshold').textContent='عتبة: '+(prop.threshold_pct||5)+'%';
  else if(s.mode==='timed') document.getElementById('kpi-threshold').textContent='تكرار: '+(prop.frequency||'daily');
  else document.getElementById('kpi-threshold').textContent='يدوي فقط';

  const threshold=prop.threshold_pct||5;
  const tbody=document.getElementById('assets-table');
  tbody.innerHTML=(s.assets||[]).map((a,i)=>{
    const dev=a.deviation||0;
    const cls=Math.abs(dev)>threshold?'dev-red':Math.abs(dev)>threshold/2?'dev-yellow':'dev-green';
    return `<tr>
      <td style="font-weight:600"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${COLORS[i%COLORS.length]};margin-left:6px;vertical-align:middle"></span>${a.symbol}</td>
      <td style="color:#d1d5db">${a.price>0?'$'+(a.price).toFixed(4):'—'}</td>
      <td style="color:#d1d5db">${(a.value_usdt||0).toFixed(2)}</td>
      <td>${(a.actual_pct||0).toFixed(2)}%</td>
      <td style="color:#9ca3af">${(a.target_pct||0).toFixed(2)}%</td>
      <td class="${cls}">${dev>=0?'+':''}${dev.toFixed(2)}%</td>
    </tr>`;
  }).join('');
}

function renderCharts(s,snaps){
  const assets=s.assets||[];
  if(pieChart)pieChart.destroy();
  pieChart=new Chart(document.getElementById('pie-chart'),{
    type:'doughnut',
    data:{labels:assets.map(a=>a.symbol),datasets:[{data:assets.map(a=>a.actual_pct||a.target_pct),backgroundColor:COLORS,borderWidth:2,borderColor:'#111827'}]},
    options:{plugins:{legend:{labels:{color:'#9ca3af',font:{size:11}}}},cutout:'55%'}
  });
  if(lineChart)lineChart.destroy();
  const hasData=snaps&&snaps.length>0;
  lineChart=new Chart(document.getElementById('line-chart'),{
    type:'line',
    data:{
      labels:hasData?snaps.map(s=>s.ts.slice(5,16)):['—'],
      datasets:[{label:'USDT',data:hasData?snaps.map(s=>s.total_usdt):[0],borderColor:'#f0b90b',backgroundColor:'rgba(240,185,11,.08)',fill:true,tension:.3,pointRadius:0,borderWidth:2}]
    },
    options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6b7280',maxTicksLimit:5,font:{size:10}},grid:{color:'#1f2937'}},y:{ticks:{color:'#6b7280',font:{size:10}},grid:{color:'#1f2937'}}}}
  });
}

async function triggerRebalance(){
  const btns=[document.getElementById('btn-rebalance'),document.getElementById('btn-rebalance2')];
  btns.forEach(b=>{if(b){b.disabled=true;b.textContent='⏳ جاري...';}});
  try{
    const res=await api('/api/rebalance',{method:'POST'});
    const details=(res.details||[]).filter(d=>d.action==='BUY'||d.action==='SELL');
    if(details.length){
      showToast('✅ تم Rebalance: '+details.map(d=>`${d.action} ${d.symbol}`).join(', '),'#4ade80');
    } else {
      showToast('✅ تم Rebalance — لا توجد تعديلات مطلوبة','#4ade80');
    }
    await loadAll();
  }catch(e){showToast('❌ خطأ: '+e.message,'#f87171');}
  finally{btns.forEach(b=>{if(b){b.disabled=false;b.textContent=b.id==='btn-rebalance'?'⚖️ Rebalance':'🔄 Rebalance يدوي';}});}
}

function exportCSV(){window.open('/api/export/csv','_blank');}

let _botRunning=false;

async function loadBotStatus(){
  try{
    const s=await api('/api/bot/status');
    _botRunning=s.running;
    updateBotBtn();
    if(s.error){
      document.getElementById('badges').innerHTML+=`<span class="badge" style="background:rgba(239,68,68,.15);color:#f87171">⚠️ ${s.error.slice(0,40)}</span>`;
    }
  }catch(e){}
}

function updateBotBtn(){
  const btn=document.getElementById('btn-toggle');
  if(!btn)return;
  btn.textContent=_botRunning?'⏸️ إيقاف':'▶️ تشغيل';
  btn.style.borderColor=_botRunning?'#4ade80':'#374151';
  btn.style.color=_botRunning?'#4ade80':'#f9fafb';
}

async function toggleBot(){
  const btn=document.getElementById('btn-toggle');
  btn.disabled=true;
  try{
    if(_botRunning){
      const r=await api('/api/bot/stop',{method:'POST'});
      _botRunning=false;
      showToast(r.message||'تم الإيقاف','#f87171');
    } else {
      const r=await api('/api/bot/start',{method:'POST'});
      if(r.ok){_botRunning=true;showToast(r.message||'تم التشغيل','#4ade80');}
      else{showToast(r.message||'خطأ','#f87171');}
    }
    updateBotBtn();
  }catch(e){showToast('خطأ: '+e.message,'#f87171');}
  finally{btn.disabled=false;}
}

function showToast(msg,color='#4ade80'){
  let t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div');
    t.id='toast';
    t.style.cssText='position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);padding:.6rem 1.25rem;border-radius:.75rem;font-weight:700;font-size:.875rem;z-index:999;transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.background=color==='#4ade80'?'rgba(74,222,128,.2)':'rgba(239,68,68,.2)';
  t.style.color=color;
  t.style.border=`1px solid ${color}`;
  t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity='0';},3000);
}
</script>

<script>
// ---- Settings ----
async function openSettings(){
  currentCfg=await api('/api/config');
  _threshold=currentCfg.rebalance.proportional.threshold_pct;
  renderSettingsForm();
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings(){document.getElementById('settings-modal').classList.remove('open');}

function renderSettingsForm(){
  const cfg=currentCfg;
  const assets=cfg.portfolio.assets;
  const mode=cfg.rebalance.mode;
  const prop=cfg.rebalance.proportional;
  const timed=cfg.rebalance.timed;
  const totalUsdt=cfg.portfolio.total_usdt||1000;

  document.getElementById('settings-body').innerHTML=`
    <div><label class="field-label">اسم البوت</label><input id="s-name" value="${cfg.bot.name}"></div>

    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
        <label class="field-label" style="margin:0">الأصول والنسب</label>
        <div style="display:flex;gap:.4rem">
          <button onclick="equalAlloc()" style="font-size:.75rem;color:#f0b90b;background:none;border:none;cursor:pointer;padding:.2rem .4rem">📐 توزيع متساوي</button>
          <button onclick="addAsset()" style="font-size:.75rem;color:#4ade80;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);border-radius:.4rem;cursor:pointer;padding:.2rem .5rem">+ إضافة</button>
        </div>
      </div>
      <div id="s-assets-list"></div>
      <p id="s-total-pct" style="font-size:.75rem;color:#9ca3af;margin-top:.3rem"></p>
    </div>

    <div><label class="field-label">المبلغ الإجمالي (USDT)</label>
      <input type="number" id="s-usdt" value="${totalUsdt}" oninput="updateUsdtValues()">
    </div>

    <div><label class="field-label">وضع إعادة التوازن</label>
      <select id="s-mode" onchange="toggleModeFields()">
        <option value="proportional" ${mode==='proportional'?'selected':''}>Proportional (نسبي)</option>
        <option value="timed" ${mode==='timed'?'selected':''}>Timed (زمني)</option>
        <option value="unbalanced" ${mode==='unbalanced'?'selected':''}>Unbalanced (يدوي)</option>
      </select>
    </div>

    <div id="s-prop-fields" style="${mode!=='proportional'?'display:none':''}">
      <label class="field-label">عتبة الانحراف</label>
      <div style="display:flex;gap:.5rem">
        ${[1,3,5].map(t=>`<button onclick="setThreshold(${t})" id="thr-${t}" style="flex:1;padding:.5rem;border-radius:.5rem;border:1px solid ${prop.threshold_pct===t?'#f0b90b':'#374151'};background:${prop.threshold_pct===t?'#f0b90b':'transparent'};color:${prop.threshold_pct===t?'#000':'#d1d5db'};cursor:pointer;font-weight:700;transition:all .2s">${t}%</button>`).join('')}
      </div>
    </div>

    <div id="s-timed-fields" style="${mode!=='timed'?'display:none':''}">
      <label class="field-label">التكرار</label>
      <select id="s-freq">
        <option value="daily" ${timed.frequency==='daily'?'selected':''}>يومي</option>
        <option value="weekly" ${timed.frequency==='weekly'?'selected':''}>أسبوعي</option>
        <option value="monthly" ${timed.frequency==='monthly'?'selected':''}>شهري</option>
      </select>
    </div>

    <label style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:.3rem 0">
      <span style="font-size:.875rem;color:#d1d5db">بيع عند الإيقاف</span>
      <input type="checkbox" id="s-sell" ${cfg.termination.sell_at_termination?'checked':''} style="width:1.1rem;height:1.1rem;accent-color:#f0b90b">
    </label>
    <label style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:.3rem 0">
      <span style="font-size:.875rem;color:#d1d5db">تمكين تحويل الأصول</span>
      <input type="checkbox" id="s-transfer" ${cfg.asset_transfer.enable_asset_transfer?'checked':''} style="width:1.1rem;height:1.1rem;accent-color:#f0b90b">
    </label>
    <label style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:.3rem 0">
      <span style="font-size:.875rem;color:#d1d5db">🧪 وضع تجريبي (Paper Trading)</span>
      <input type="checkbox" id="s-paper" ${cfg.paper_trading?'checked':''} style="width:1.1rem;height:1.1rem;accent-color:#f0b90b">
    </label>
  `;
  renderAssetRows(assets, totalUsdt);
}

function renderAssetRows(assets, totalUsdt){
  const container=document.getElementById('s-assets-list');
  container.innerHTML=assets.map((a,i)=>{
    const usdtVal=((a.allocation_pct/100)*totalUsdt).toFixed(2);
    return `<div class="asset-row" id="asset-row-${i}">
      <input type="text" id="s-sym-${i}" value="${a.symbol}" placeholder="BTC" style="width:4.5rem;text-transform:uppercase">
      <input type="number" id="s-pct-${i}" value="${a.allocation_pct}" min="0" max="100" step="0.01" oninput="updateTotalPct();updateUsdtValues()" style="flex:1">
      <span style="color:#9ca3af;font-size:.8rem;flex-shrink:0">%</span>
      <span class="usdt-val" id="s-usdt-val-${i}">${usdtVal}</span>
      <button class="btn-danger" onclick="removeAsset(${i})" title="حذف">🗑️</button>
    </div>`;
  }).join('');
  updateTotalPct();
}

function addAsset(){
  if(!currentCfg)return;
  currentCfg.portfolio.assets.push({symbol:'NEW',allocation_pct:0});
  renderAssetRows(currentCfg.portfolio.assets, parseFloat(document.getElementById('s-usdt').value)||1000);
}

function removeAsset(i){
  if(!currentCfg||currentCfg.portfolio.assets.length<=2){alert('لازم يكون فيه عملتين على الأقل');return;}
  currentCfg.portfolio.assets.splice(i,1);
  renderAssetRows(currentCfg.portfolio.assets, parseFloat(document.getElementById('s-usdt').value)||1000);
}

function updateTotalPct(){
  const n=currentCfg.portfolio.assets.length;
  let total=0;
  for(let i=0;i<n;i++){const el=document.getElementById('s-pct-'+i);if(el)total+=parseFloat(el.value)||0;}
  const el=document.getElementById('s-total-pct');
  if(el){el.textContent='المجموع: '+total.toFixed(2)+'%';el.style.color=Math.abs(total-100)<0.1?'#4ade80':'#f87171';}
}

function updateUsdtValues(){
  const totalUsdt=parseFloat(document.getElementById('s-usdt')?.value)||1000;
  const n=currentCfg.portfolio.assets.length;
  for(let i=0;i<n;i++){
    const pctEl=document.getElementById('s-pct-'+i);
    const valEl=document.getElementById('s-usdt-val-'+i);
    if(pctEl&&valEl){valEl.textContent=((parseFloat(pctEl.value)||0)/100*totalUsdt).toFixed(2);}
  }
}

function equalAlloc(){
  const n=currentCfg.portfolio.assets.length;
  const pct=parseFloat((100/n).toFixed(4));
  for(let i=0;i<n;i++){
    const el=document.getElementById('s-pct-'+i);
    if(el)el.value=i===n-1?(100-pct*(n-1)).toFixed(4):pct;
  }
  updateTotalPct();updateUsdtValues();
}

function setThreshold(t){
  _threshold=t;
  [1,3,5].forEach(v=>{
    const b=document.getElementById('thr-'+v);
    if(b){b.style.borderColor=v===t?'#f0b90b':'#374151';b.style.background=v===t?'#f0b90b':'transparent';b.style.color=v===t?'#000':'#d1d5db';}
  });
}

function toggleModeFields(){
  const mode=document.getElementById('s-mode').value;
  document.getElementById('s-prop-fields').style.display=mode==='proportional'?'':'none';
  document.getElementById('s-timed-fields').style.display=mode==='timed'?'':'none';
}

async function saveSettings(){
  const n=currentCfg.portfolio.assets.length;
  const assets=[];
  for(let i=0;i<n;i++){
    const sym=document.getElementById('s-sym-'+i)?.value.trim().toUpperCase();
    const pct=parseFloat(document.getElementById('s-pct-'+i)?.value)||0;
    if(sym)assets.push({symbol:sym,allocation_pct:pct});
  }
  const total=assets.reduce((s,a)=>s+a.allocation_pct,0);
  if(Math.abs(total-100)>0.1){alert('المجموع لازم يكون 100% (الحالي: '+total.toFixed(2)+'%)');return;}
  const mode=document.getElementById('s-mode').value;
  const body={
    bot_name:document.getElementById('s-name').value,
    assets,
    total_usdt:parseFloat(document.getElementById('s-usdt').value),
    rebalance_mode:mode,
    threshold_pct:_threshold||currentCfg.rebalance.proportional.threshold_pct,
    frequency:document.getElementById('s-freq')?.value||currentCfg.rebalance.timed.frequency,
    sell_at_termination:document.getElementById('s-sell').checked,
    enable_asset_transfer:document.getElementById('s-transfer').checked,
    paper_trading:document.getElementById('s-paper').checked,
  };
  try{
    await api('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    closeSettings();loadAll();
  }catch(e){alert('❌ خطأ في الحفظ: '+e.message);}
}

// ---- History ----
async function openHistory(){
  document.getElementById('history-modal').classList.add('open');
  document.getElementById('history-body').innerHTML='<p style="color:#6b7280;text-align:center;padding:1rem">⏳ جاري التحميل...</p>';
  try{
    const rows=await api('/api/history?limit=20');
    if(!rows.length){document.getElementById('history-body').innerHTML='<p style="color:#6b7280;font-size:.875rem">لا توجد عمليات بعد.</p>';return;}
    document.getElementById('history-body').innerHTML=rows.map(r=>{
      const orders=(r.details||[]).filter(d=>d.action==='BUY'||d.action==='SELL').map(d=>
        `<span style="font-size:.75rem;padding:.2rem .5rem;border-radius:.4rem;background:${d.action==='BUY'?'rgba(74,222,128,.1)':'rgba(248,113,113,.1)'};color:${d.action==='BUY'?'#4ade80':'#f87171'};display:inline-block;margin:.15rem">${d.action} ${d.symbol} ${d.diff_usdt>=0?'+':''}${d.diff_usdt.toFixed(2)} USDT</span>`
      ).join('');
      return `<div style="background:rgba(31,41,55,.5);border-radius:.75rem;padding:.75rem;margin-bottom:.5rem">
        <div style="display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;margin-bottom:.35rem">
          <span style="font-size:.75rem;color:#9ca3af">${r.ts}</span>
          <span class="badge tag-mode">${r.mode}</span>
          ${r.paper?'<span class="badge tag-paper">Paper</span>':''}
          <span style="font-size:.75rem;color:#d1d5db">${(r.total_usdt||0).toFixed(2)} USDT</span>
        </div>
        <div>${orders||'<span style="color:#6b7280;font-size:.75rem">لا توجد أوردرات</span>'}</div>
      </div>`;
    }).join('');
  }catch(e){document.getElementById('history-body').innerHTML='<p style="color:#f87171">خطأ: '+e.message+'</p>';}
}
function closeHistory(){document.getElementById('history-modal').classList.remove('open');}

// ---- Init ----
loadAll();
setInterval(loadAll,30000);
setInterval(updateLastUpdateText,10000);
setInterval(loadBotStatus,10000);
</script>
