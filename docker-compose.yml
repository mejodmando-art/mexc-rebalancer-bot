version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Required
      - MEXC_API_KEY=${MEXC_API_KEY}
      - MEXC_SECRET_KEY=${MEXC_SECRET_KEY}
      # Optional – enables Telegram bot
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # Optional – paper trading (set to "false" for live trading)
      - PAPER_TRADING=${PAPER_TRADING:-false}
    volumes:
      # Persist SQLite database and config across restarts
      - ./portfolio.db:/app/portfolio.db
      - ./config.json:/app/config.json
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
