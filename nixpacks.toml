[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "npm ci --prefix web"
]

[phases.build]
cmds = [
  "npm run build --prefix web",
  "mkdir -p static api/static",
  "rm -rf static/_next api/static/_next",
  "cp -r web/out/. static/",
  "cp -r web/out/. api/static/"
]

[start]
cmd = "python main.py"
