[phases.setup]
nixPkgs = ["python311", "nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "cd web && npm ci --prefer-offline"
]

[phases.build]
cmds = [
  "cd web && npm run build",
  "mkdir -p static api/static",
  "cp -r web/out/. static/",
  "cp -r web/out/. api/static/"
]

[start]
cmd = "python main.py"
