[phases.setup]
nixPkgs = ["nodejs_20", "nodePackages.npm"]
aptPkgs = ["python3", "python3-pip", "python3-venv"]

[phases.install]
cmds = [
  "python3 -m pip install --break-system-packages -r requirements.txt",
  "npm install --prefix web"
]

[phases.build]
cmds = [
  "npm run build --prefix web",
  "mkdir -p static api/static",
  "cp -r web/out/. static/",
  "cp -r web/out/. api/static/",
  "ls static/index.html && echo '✓ static OK'"
]

[start]
cmd = "python main.py"
