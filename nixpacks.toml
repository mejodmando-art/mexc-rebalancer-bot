[phases.setup]
nixPkgs = ["python311", "nodejs_20", "nodePackages.npm"]
aptPkgs = ["python3-pip"]

[phases.install]
cmds = [
  "pip3 install -r requirements.txt",
  "npm install --prefix web"
]

[phases.build]
cmds = [
  "npm run build --prefix web",
  "mkdir -p static api/static",
  "cp -r web/out/. static/",
  "cp -r web/out/. api/static/",
  "ls static/index.html && echo '✓ static OK'"
]

[start]
cmd = "python main.py"
